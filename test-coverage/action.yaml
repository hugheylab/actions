name: 'test-coverage'
description: 'Action to run tests and upload to codecov.'
author: 'Josh Schoenbachler'
runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v2

    - uses: r-lib/actions/setup-r@v1
      with:
        use-public-rspm: true

    - uses: r-lib/actions/setup-r-dependencies@v1
      with:
        extra-packages: covr

    - name: Download test data folder
      run: |
        cd tests/testthat/test_data
        wget "https://www.dropbox.com/s/z6idgjm3zccrf3f/GSE143524.tar.gz?dl=1"
        mv GSE143524.tar.gz?dl=1 GSE143524.tar.gz
        tar -xf GSE143524.tar.gz
        rm GSE143524.tar.gz
        cd ../../../
      shell: bash

    - name: Test coverage
      run: covr::codecov()
      shell: Rscript {0}